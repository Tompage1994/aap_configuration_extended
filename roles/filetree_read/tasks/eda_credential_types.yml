---
- name: "Get list of files inside {{ filetree_eda_credential_types }}"
  ansible.builtin.find:
    paths: "{{ filetree_eda_credential_types }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    contains: "eda_credential_types:"
    read_whole_file: true
    recurse: true
  register: __list_files_eda_credential_types

- name: "Read EDA credential types definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_eda_credential_types_item.path }}"
  loop: "{{ __list_files_eda_credential_types.files }}"
  loop_control:
    loop_var: __read_eda_credential_types_item
  register: __contents_filetree_eda_credential_types
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_eda_credential_types"

- name: "Populate EDA credential types list"
  ansible.builtin.set_fact:
    __populate_eda_credential_types: "{{ (__populate_eda_credential_types | default([])) + __populate_eda_credential_types_item.ansible_facts.eda_credential_types }}"
  loop: "{{ __contents_filetree_eda_credential_types.results }}"
  loop_control:
    loop_var: __populate_eda_credential_types_item
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when:
    - __contents_filetree_eda_credential_types is defined
    - __contents_filetree_eda_credential_types.results is defined
    - __contents_filetree_eda_credential_types.results | length > 0
    - __populate_eda_credential_types_item.ansible_facts.eda_credential_types is defined

- name: "Set EDA credential types data structure"
  ansible.builtin.set_fact:
    eda_credential_types: "{{ __populate_eda_credential_types }}"
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when: __populate_eda_credential_types is defined
...
