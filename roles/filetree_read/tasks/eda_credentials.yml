---
- name: "Get list of files inside {{ filetree_eda_credentials }}"
  ansible.builtin.find:
    paths: "{{ filetree_eda_credentials }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    contains: "eda_credentials:"
    read_whole_file: true
    recurse: true
  register: __list_files_eda_credentials

- name: "Read EDA credentials definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_eda_credentials_item.path }}"
  loop: "{{ __list_files_eda_credentials.files }}"
  loop_control:
    loop_var: __read_eda_credentials_item
  register: __contents_filetree_eda_credentials
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_eda_credentials"

- name: "Populate EDA credentials list"
  ansible.builtin.set_fact:
    __populate_eda_credentials: "{{ (__populate_eda_credentials | default([])) + __populate_eda_credentials_item.ansible_facts.eda_credentials }}"
  loop: "{{ __contents_filetree_eda_credentials.results }}"
  loop_control:
    loop_var: __populate_eda_credentials_item
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when:
    - __contents_filetree_eda_credentials is defined
    - __contents_filetree_eda_credentials.results is defined
    - __contents_filetree_eda_credentials.results | length > 0
    - __populate_eda_credentials_item.ansible_facts.eda_credentials is defined

- name: "Set EDA credentials data structure"
  ansible.builtin.set_fact:
    eda_credentials: "{{ __populate_eda_credentials }}"
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when: __populate_eda_credentials is defined
...
