---
- name: "Get list of files inside {{ filetree_gateway_service_nodes }}"
  ansible.builtin.find:
    paths: "{{ filetree_gateway_service_nodes }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    contains: "gateway_service_nodes:"
    read_whole_file: true
    recurse: true
  register: __list_files_gateway_service_nodes

- name: "Read Service Nodes definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_service_nodes_definitions_item.path }}"
  loop: "{{ __list_files_gateway_service_nodes.files }}"
  loop_control:
    loop_var: __read_service_nodes_definitions_item
  register: __contents_filetree_gateway_service_nodes
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_gateway_service_nodes"

- name: "Set Service Nodes Data Structure"
  ansible.builtin.set_fact:
    gateway_service_nodes: >-
      {{
        __contents_filetree_gateway_service_nodes.results |
        rejectattr('ansible_facts.gateway_service_nodes', 'undefined') |
        map(attribute='ansible_facts.gateway_service_nodes') |
        ansible.builtin.flatten
      }}
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when:
    - __contents_filetree_gateway_service_nodes is defined
    - __contents_filetree_gateway_service_nodes.results is defined
    - __contents_filetree_gateway_service_nodes.results | length > 0
...
