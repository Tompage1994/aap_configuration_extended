---
- name: "Get list of files inside {{ filetree_gateway_services }}"
  ansible.builtin.find:
    paths: "{{ filetree_gateway_services }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    recurse: true
  register: __list_files_gateway_services

- name: "Read Services definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_services_definitions_item.path }}"
  loop: "{{ __list_files_gateway_services.files }}"
  loop_control:
    loop_var: __read_services_definitions_item
  register: __contents_filetree_gateway_services
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_gateway_services"

- name: "Set Services Data Structure"
  ansible.builtin.set_fact:
    gateway_services: >-
      {{
        __contents_filetree_gateway_services.results |
        rejectattr('ansible_facts.gateway_services', 'undefined') |
        map(attribute='ansible_facts.gateway_services') |
        ansible.builtin.flatten
      }}
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when:
    - __contents_filetree_gateway_services is defined
    - __contents_filetree_gateway_services.results is defined
    - __contents_filetree_gateway_services.results | length > 0
...
