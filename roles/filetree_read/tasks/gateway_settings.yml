---
- name: "Get list of files inside {{ filetree_gateway_settings }}"
  ansible.builtin.find:
    paths: "{{ filetree_gateway_settings }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    recurse: true
  register: __list_files_gateway_settings

- name: "Read Settings definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_settings_definitions_item.path }}"
  loop: "{{ __list_files_gateway_settings.files }}"
  loop_control:
    loop_var: __read_settings_definitions_item
  register: __contents_filetree_gateway_settings
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_gateway_settings"

- name: "Set Settings Data Structure"
  ansible.builtin.set_fact:
    gateway_settings: >-
      {{
        __contents_filetree_gateway_settings.results |
        rejectattr('ansible_facts.gateway_settings', 'undefined') |
        map(attribute='ansible_facts.gateway_settings') |
        combine
      }}
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when: __contents_filetree_gateway_settings.results
...
