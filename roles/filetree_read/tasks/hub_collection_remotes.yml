---
- name: "Get list of files inside {{ filetree_hub_collection_remotes }}"
  ansible.builtin.find:
    paths: "{{ filetree_hub_collection_remotes }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    contains: "hub_collection_remotes:"
    read_whole_file: true
    recurse: true
  register: __list_files_hub_collection_remotes

- name: "Read Hub collection remotes definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_hub_collection_remotes_item.path }}"
  loop: "{{ __list_files_hub_collection_remotes.files }}"
  loop_control:
    loop_var: __read_hub_collection_remotes_item
  register: __contents_filetree_hub_collection_remotes
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_hub_collection_remotes"

- name: "Populate Hub collection remotes list"
  ansible.builtin.set_fact:
    __populate_hub_collection_remotes: "{{ (__populate_hub_collection_remotes | default([])) + __populate_hub_collection_remotes_item.ansible_facts.hub_collection_remotes }}"
  loop: "{{ __contents_filetree_hub_collection_remotes.results }}"
  loop_control:
    loop_var: __populate_hub_collection_remotes_item
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when:
    - __contents_filetree_hub_collection_remotes is defined
    - __contents_filetree_hub_collection_remotes.results is defined
    - __contents_filetree_hub_collection_remotes.results | length > 0
    - __populate_hub_collection_remotes_item.ansible_facts.hub_collection_remotes is defined

- name: "Set Hub collection remotes data structure"
  ansible.builtin.set_fact:
    hub_collection_remotes: "{{ __populate_hub_collection_remotes }}"
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when: __populate_hub_collection_remotes is defined
...
