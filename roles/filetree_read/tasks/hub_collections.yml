---
- name: "Get list of files inside {{ filetree_hub_collections }}"
  ansible.builtin.find:
    paths: "{{ filetree_hub_collections }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    contains: "hub_collections:"
    read_whole_file: true
    recurse: true
  register: __list_files_hub_collections

- name: "Read Hub collections definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_hub_collections_item.path }}"
  loop: "{{ __list_files_hub_collections.files }}"
  loop_control:
    loop_var: __read_hub_collections_item
  register: __contents_filetree_hub_collections
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_hub_collections"

- name: "Populate Hub collections list"
  ansible.builtin.set_fact:
    __populate_hub_collections: "{{ (__populate_hub_collections | default([])) + __populate_hub_collections_item.ansible_facts.hub_collections }}"
  loop: "{{ __contents_filetree_hub_collections.results }}"
  loop_control:
    loop_var: __populate_hub_collections_item
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when:
    - __contents_filetree_hub_collections is defined
    - __contents_filetree_hub_collections.results is defined
    - __contents_filetree_hub_collections.results | length > 0
    - __populate_hub_collections_item.ansible_facts.hub_collections is defined

- name: "Set Hub collections data structure"
  ansible.builtin.set_fact:
    hub_collections: "{{ __populate_hub_collections }}"
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when: __populate_hub_collections is defined
...
