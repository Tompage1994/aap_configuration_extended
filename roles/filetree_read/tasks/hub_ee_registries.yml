---
- name: "Get list of files inside {{ filetree_hub_ee_registries }}"
  ansible.builtin.find:
    paths: "{{ filetree_hub_ee_registries }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    contains: "hub_ee_registries:"
    read_whole_file: true
    recurse: true
  register: __list_files_hub_ee_registries

- name: "Read Hub EE registries definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_hub_ee_registries_item.path }}"
  loop: "{{ __list_files_hub_ee_registries.files }}"
  loop_control:
    loop_var: __read_hub_ee_registries_item
  register: __contents_filetree_hub_ee_registries
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_hub_ee_registries"

- name: "Populate Hub EE registries list"
  ansible.builtin.set_fact:
    __populate_hub_ee_registries: "{{ (__populate_hub_ee_registries | default([])) + __populate_hub_ee_registries_item.ansible_facts.hub_ee_registries }}"
  loop: "{{ __contents_filetree_hub_ee_registries.results }}"
  loop_control:
    loop_var: __populate_hub_ee_registries_item
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when:
    - __contents_filetree_hub_ee_registries is defined
    - __contents_filetree_hub_ee_registries.results is defined
    - __contents_filetree_hub_ee_registries.results | length > 0
    - __populate_hub_ee_registries_item.ansible_facts.hub_ee_registries is defined

- name: "Set Hub EE registries data structure"
  ansible.builtin.set_fact:
    hub_ee_registries: "{{ __populate_hub_ee_registries }}"
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when: __populate_hub_ee_registries is defined
...
