---
- name: "Get list of files inside {{ filetree_hub_ee_repositories }}"
  ansible.builtin.find:
    paths: "{{ filetree_hub_ee_repositories }}"
    file_type: file
    patterns: "{{ filetree_controller_include | default(omit) }}"
    excludes: "{{ filetree_controller_exclude | default(omit) }}"
    use_regex: "{{ filetree_controller_regex | default(false) }}"
    contains: "hub_ee_repositories:"
    read_whole_file: true
    recurse: true
  register: __list_files_hub_ee_repositories

- name: "Read Hub EE repositories definitions"
  ansible.builtin.include_vars:
    file: "{{ __read_hub_ee_repositories_item.path }}"
  loop: "{{ __list_files_hub_ee_repositories.files }}"
  loop_control:
    loop_var: __read_hub_ee_repositories_item
  register: __contents_filetree_hub_ee_repositories
  failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_hub_ee_repositories"

- name: "Populate Hub EE repositories list"
  ansible.builtin.set_fact:
    __populate_hub_ee_repositories: "{{ (__populate_hub_ee_repositories | default([])) + __populate_hub_ee_repositories_item.ansible_facts.hub_ee_repositories }}"
  loop: "{{ __contents_filetree_hub_ee_repositories.results }}"
  loop_control:
    loop_var: __populate_hub_ee_repositories_item
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when:
    - __contents_filetree_hub_ee_repositories is defined
    - __contents_filetree_hub_ee_repositories.results is defined
    - __contents_filetree_hub_ee_repositories.results | length > 0
    - __populate_hub_ee_repositories_item.ansible_facts.hub_ee_repositories is defined

- name: "Set Hub EE repositories data structure"
  ansible.builtin.set_fact:
    hub_ee_repositories: "{{ __populate_hub_ee_repositories }}"
  no_log: "{{ controller_configuration_filetree_read_secure_logging }}"
  when: __populate_hub_ee_repositories is defined
...
